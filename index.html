<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HUM — Humble Utility Machine</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #07080f;
    --surface:     #0d0f1c;
    --elevated:    #131525;
    --input-bg:    #181a2e;
    --border:      #252840;
    --accent:      #2dd4bf;
    --accent-soft: #5eead4;
    --accent-dim:  rgba(45,212,191,0.12);
    --user-bg:     #0d2626;
    --ai-bg:       #0e101f;
    --text:        #e4e8f0;
    --muted:       #6b7280;
    --faint:       #2a2c40;
    --error:       #fca5a5;
    --error-bg:    rgba(220,38,38,0.1);
    --r-sm: 6px; --r-md: 12px; --r-lg: 18px;
  }

  html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* Layout */
  #app { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; }

  /* Header */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 22px; color: var(--accent); line-height: 1; }
  .logo-name { font-size: 15px; font-weight: 700; letter-spacing: 0.05em; display: block; line-height: 1; }
  .logo-sub  { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; display: block; margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); background: var(--accent-dim); padding: 3px 9px; border-radius: 99px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }
  select, .icon-btn {
    background: var(--elevated); border: 1px solid var(--border); color: var(--text);
    padding: 5px 8px; border-radius: var(--r-sm); font-size: 12px; cursor: pointer; outline: none;
    font-family: inherit;
  }
  .icon-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; padding: 0; color: var(--muted); }
  .icon-btn:disabled { opacity: 0.4; cursor: default; }

  /* Messages */
  #messages {
    flex: 1; overflow-y: auto; padding: 24px 20px;
    display: flex; flex-direction: column; gap: 16px;
  }

  /* Empty state */
  #empty {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; text-align: center; flex: 1;
    padding: 40px 16px; gap: 10px;
  }
  .empty-icon { font-size: 42px; color: var(--accent); opacity: .6; margin-bottom: 4px; }
  .empty-title { font-size: 18px; font-weight: 600; }
  .empty-desc { font-size: 13px; color: var(--muted); max-width: 300px; line-height: 1.5; }
  .suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; width: 100%; max-width: 480px; }
  .sug-btn {
    background: var(--elevated); border: 1px solid var(--border); color: var(--muted);
    padding: 10px 12px; border-radius: var(--r-md); cursor: pointer;
    font-size: 12px; text-align: left; line-height: 1.4; font-family: inherit;
    transition: border-color .15s, color .15s;
  }
  .sug-btn:hover { border-color: var(--accent); color: var(--text); }

  /* Message row */
  .msg-row { display: flex; align-items: flex-start; gap: 10px; animation: fadeIn .2s ease; }
  .msg-row.user { justify-content: flex-end; }
  .avatar {
    width: 30px; height: 30px; flex-shrink: 0; border-radius: var(--r-sm);
    background: var(--elevated); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: var(--accent-soft); margin-top: 2px;
  }
  .avatar.user-av { background: var(--accent-dim); }
  .bubble {
    max-width: 78%; padding: 11px 15px; font-size: 14px; line-height: 1.65;
    word-break: break-word; border: 1px solid var(--border);
  }
  .bubble.user {
    background: var(--user-bg);
    border-color: rgba(45,212,191,.2);
    border-radius: var(--r-lg) var(--r-lg) 4px var(--r-lg);
    white-space: pre-wrap;
  }
  .bubble.ai {
    background: var(--ai-bg);
    border-radius: 4px var(--r-lg) var(--r-lg) var(--r-lg);
  }

  /* Markdown in AI bubble */
  .bubble.ai p { margin-bottom: .55em; }
  .bubble.ai p:last-child { margin-bottom: 0; }
  .bubble.ai pre {
    background: #080a18; border: 1px solid var(--border); border-radius: var(--r-sm);
    padding: 11px 13px; margin: 8px 0; overflow-x: auto;
    font-family: 'JetBrains Mono', monospace; font-size: .8em; line-height: 1.6;
  }
  .bubble.ai code {
    font-family: 'JetBrains Mono', monospace; font-size: .85em;
    background: rgba(45,212,191,.1); padding: 2px 5px; border-radius: 4px; color: var(--accent-soft);
  }
  .bubble.ai pre code { background: transparent; padding: 0; color: #c0d0e0; }
  .bubble.ai strong { font-weight: 600; color: #f0f4ff; }
  .bubble.ai em { font-style: italic; color: #b0bec8; }

  /* Thinking cursor */
  .cursor { display: inline-block; width: 10px; height: 16px; background: var(--accent); border-radius: 2px; animation: blink .9s infinite; vertical-align: middle; }

  /* Error */
  .error-box {
    background: var(--error-bg); border: 1px solid rgba(220,38,38,.3);
    border-radius: var(--r-md); padding: 11px 15px;
    font-size: 13px; color: var(--error);
  }

  /* Footer */
  footer {
    border-top: 1px solid var(--border); padding: 13px 20px 15px;
    background: var(--surface); flex-shrink: 0;
  }
  .input-wrap {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: var(--r-md); padding: 10px 12px;
    transition: border-color .2s;
  }
  .input-wrap:focus-within { border-color: rgba(45,212,191,.4); }
  textarea {
    flex: 1; background: transparent; border: none; color: var(--text);
    font-size: 14px; resize: none; outline: none; line-height: 1.5;
    font-family: 'Inter', sans-serif; min-height: 22px; max-height: 160px;
  }
  textarea::placeholder { color: var(--muted); }
  .send-btn, .stop-btn {
    width: 34px; height: 34px; border: none; border-radius: var(--r-sm);
    cursor: pointer; font-size: 15px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .15s;
  }
  .send-btn { background: var(--accent); color: #07080f; }
  .send-btn:disabled { opacity: .35; cursor: default; }
  .stop-btn { background: #dc2626; color: #fff; }
  .foot-note { font-size: 11px; color: var(--faint); text-align: center; margin-top: 8px; }
  .foot-note a { color: var(--accent-soft); text-decoration: none; }

  /* Settings modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(4px);
  }
  .hidden { display: none !important; }
  .modal {
    background: var(--elevated); border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 24px; width: 90%; max-width: 480px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .modal h3 { font-size: 16px; font-weight: 600; }
  .modal p  { font-size: 13px; color: var(--muted); }
  .modal textarea {
    background: var(--input-bg); border: 1px solid var(--border);
    border-radius: var(--r-sm); padding: 10px 12px;
    font-size: 13px; line-height: 1.6; width: 100%; resize: vertical;
    color: var(--text); font-family: 'Inter', sans-serif; min-height: 110px;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-sec { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 7px 16px; border-radius: var(--r-sm); cursor: pointer; font-size: 13px; font-family: inherit; }
  .btn-pri { background: var(--accent); border: none; color: #07080f; padding: 7px 16px; border-radius: var(--r-sm); cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes blink  { 0%,100% { opacity: .2; } 50% { opacity: 1; } }
</style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <span class="logo-icon">◎</span>
      <div>
        <span class="logo-name">HUM</span>
        <span class="logo-sub">Humble Utility Machine</span>
      </div>
    </div>
    <div class="header-right">
      <div class="status"><span class="dot"></span><span id="status-model">gpt-5.4-mini</span></div>
      <select id="model-select">
        <option value="gpt-5.4-mini">gpt-5.4-mini</option>
        <option value="gpt-5.4">gpt-5.4</option>
        <option value="gpt-5.5">gpt-5.5</option>
        <option value="gpt-5.3-codex">gpt-5.3-codex</option>
      </select>
      <button class="icon-btn" id="settings-btn" title="System Prompt">⚙</button>
      <button class="icon-btn" id="clear-btn" title="Clear chat" disabled>✕</button>
    </div>
  </header>

  <!-- Messages -->
  <div id="messages">
    <div id="empty">
      <div class="empty-icon">◎</div>
      <p class="empty-title">Halo, aku HUM 👋</p>
      <p class="empty-desc">Humble Utility Machine — rendah hati, siap membantu. Tanyakan apa saja.</p>
      <div class="suggestions">
        <button class="sug-btn" onclick="useSuggestion(this)">Jelaskan konsep quantum computing</button>
        <button class="sug-btn" onclick="useSuggestion(this)">Buatkan kode Python untuk sorting</button>
        <button class="sug-btn" onclick="useSuggestion(this)">Apa perbedaan React dan Vue?</button>
        <button class="sug-btn" onclick="useSuggestion(this)">Tuliskan cerita pendek sci-fi</button>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="input-wrap">
      <textarea id="input" placeholder="Ketik pesan..." rows="1" enterkeyhint="send"></textarea>
      <button class="stop-btn hidden" id="stop-btn" title="Stop">⏹</button>
      <button class="send-btn" id="send-btn" disabled title="Kirim">➤</button>
    </div>
    <p class="foot-note">HUM · Powered by <a href="https://freemodel.dev" target="_blank">FreeModel.dev</a></p>
  </footer>
</div>

<!-- Settings modal -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <h3>System Prompt</h3>
    <p>Atur kepribadian dan konteks HUM.</p>
    <textarea id="system-input"></textarea>
    <div class="modal-actions">
      <button class="btn-sec" id="modal-cancel">Batal</button>
      <button class="btn-pri" id="modal-save">Simpan</button>
    </div>
  </div>
</div>

<script>
  const DEFAULT_SYSTEM = 'Kamu adalah HUM (Humble Utility Machine) — asisten AI yang rendah hati, cerdas, dan selalu berusaha memberikan jawaban yang benar-benar berguna. Kamu tidak pernah sombong, selalu jujur jika tidak tahu, dan senang membantu siapa saja. Jawab dengan jelas, ringkas, dan hangat. Gunakan Bahasa Indonesia kecuali user minta bahasa lain.'

  let messages = []
  let systemPrompt = DEFAULT_SYSTEM
  let isLoading = false
  let abortCtrl = null

  const $messages  = document.getElementById('messages')
  const $empty     = document.getElementById('empty')
  const $input     = document.getElementById('input')
  const $sendBtn   = document.getElementById('send-btn')
  const $stopBtn   = document.getElementById('stop-btn')
  const $clearBtn  = document.getElementById('clear-btn')
  const $modelSel  = document.getElementById('model-select')
  const $statusModel = document.getElementById('status-model')
  const $overlay   = document.getElementById('overlay')
  const $sysInput  = document.getElementById('system-input')

  $sysInput.value = systemPrompt

  // Auto-resize textarea
  $input.addEventListener('input', () => {
    $sendBtn.disabled = !$input.value.trim() || isLoading
    $input.style.height = 'auto'
    $input.style.height = Math.min($input.scrollHeight, 160) + 'px'
  })

  $input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage() }
  })

  $modelSel.addEventListener('change', () => {
    $statusModel.textContent = $modelSel.value
  })

  $clearBtn.addEventListener('click', clearChat)
  $stopBtn.addEventListener('click', () => abortCtrl?.abort())

  document.getElementById('settings-btn').addEventListener('click', () => {
    $sysInput.value = systemPrompt
    $overlay.classList.remove('hidden')
  })
  document.getElementById('modal-cancel').addEventListener('click', () => $overlay.classList.add('hidden'))
  document.getElementById('modal-save').addEventListener('click', () => {
    systemPrompt = $sysInput.value.trim() || DEFAULT_SYSTEM
    $overlay.classList.add('hidden')
  })
  $overlay.addEventListener('click', e => { if (e.target === $overlay) $overlay.classList.add('hidden') })

  function useSuggestion(btn) {
    $input.value = btn.textContent.trim()
    $input.dispatchEvent(new Event('input'))
    $input.focus()
  }

  function scrollBottom() {
    $messages.scrollTop = $messages.scrollHeight
  }

  function renderMarkdown(text) {
    let html = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // code blocks
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code) =>
      `<pre><code>${code.trim()}</code></pre>`)
    // inline code
    html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>')
    // bold / italic
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>')
    // paragraphs
    html = html.split('\n\n').map(p => `<p>${p.replace(/\n/g,'<br>')}</p>`).join('')
    return html
  }

  function addMessage(role, content = '') {
    $empty.style.display = 'none'

    const row = document.createElement('div')
    row.className = `msg-row${role === 'user' ? ' user' : ''}`

    const av = document.createElement('div')
    av.className = `avatar${role === 'user' ? ' user-av' : ''}`
    av.textContent = role === 'user' ? 'U' : 'AI'

    const bubble = document.createElement('div')
    bubble.className = `bubble ${role}`

    if (role === 'user') {
      bubble.textContent = content
      row.appendChild(bubble)
      row.appendChild(av)
    } else {
      if (content) bubble.innerHTML = renderMarkdown(content)
      else bubble.innerHTML = '<span class="cursor"></span>'
      row.appendChild(av)
      row.appendChild(bubble)
    }

    $messages.appendChild(row)
    scrollBottom()
    return bubble
  }

  function setLoading(val) {
    isLoading = val
    $sendBtn.classList.toggle('hidden', val)
    $stopBtn.classList.toggle('hidden', !val)
    $input.disabled = val
    $modelSel.disabled = val
    $clearBtn.disabled = val || messages.length === 0
  }

  async function sendMessage() {
    const text = $input.value.trim()
    if (!text || isLoading) return

    $input.value = ''
    $input.style.height = 'auto'
    $sendBtn.disabled = true

    messages.push({ role: 'user', content: text })
    addMessage('user', text)

    setLoading(true)
    const aiBubble = addMessage('assistant', '')

    abortCtrl = new AbortController()

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: abortCtrl.signal,
        body: JSON.stringify({
          messages,
          model: $modelSel.value,
          systemPrompt,
        }),
      })

      const data = await res.json()

      if (!res.ok || data.error) {
        aiBubble.innerHTML = ''
        const errBox = document.createElement('div')
        errBox.className = 'error-box'
        errBox.textContent = '⚠ ' + (data.error || `HTTP ${res.status}`)
        aiBubble.parentElement.replaceChild(errBox, aiBubble)
        messages.pop()
      } else {
        aiBubble.innerHTML = renderMarkdown(data.content)
        messages.push({ role: 'assistant', content: data.content })
        scrollBottom()
      }

    } catch (err) {
      if (err.name !== 'AbortError') {
        aiBubble.innerHTML = `<span style="color:var(--error)">⚠ ${err.message}</span>`
        messages.pop()
      }
    } finally {
      setLoading(false)
      $clearBtn.disabled = messages.length === 0
      $input.focus()
    }
  }

  function clearChat() {
    messages = []
    // remove all message rows
    Array.from($messages.querySelectorAll('.msg-row, .error-box')).forEach(el => el.remove())
    $empty.style.display = ''
    $clearBtn.disabled = true
  }
</script>
</body>
</html>
